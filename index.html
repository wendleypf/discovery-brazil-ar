<a-scene
        loading-screen="enabled: false;"
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;">

        <img id="map-marker" src="./assets/map-marker.png">

    window.onload = () => {
        const scene = document.querySelector('a-scene');
        scene.addEventListener('loaded', () => {
            const image = document.createElement('a-image');

            image.setAttribute('src', '#map-marker');
            image.setAttribute('scale', '10 10 10');
            image.setAttribute('look-at', '[gps-camera]');
            image.setAttribute('gps-entity-place', 'latitude: -7.253013853760671; longitude: -35.915053939074824');
            image.addEventListener('loaded', () => window.dispatchEvent(new CustomEvent('gps-entity-place-loaded')));
            scene.appendChild(image);
